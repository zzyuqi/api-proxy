server:
  port: 8080

spring:
  application:
    name: api-proxy

  datasource:
    url: jdbc:mysql://localhost:3308/api_proxy?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# ========== Custom Config ==========
proxy:
  admin:
    username: admin
    password: admin123
  rate-limit:
    default-limit: 60
  log:
    retention-days: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# H2 Development Profile (for testing without MySQL)
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:file:./data/proxy_db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
